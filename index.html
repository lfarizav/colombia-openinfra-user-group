  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* OpenInfra brand colors as OKLCH */
      --red:    oklch(0.52 0.22 27);
      --green:  oklch(0.68 0.18 145);
      --blue:   oklch(0.72 0.15 220);
      --gold:   oklch(0.82 0.17 80);
      --font-head: 'Space Grotesk', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius-sm: 8px; --radius-md: 14px; --radius-lg: 22px; --radius-xl: 32px;
    }
    [data-theme="dark"] {
      --bg:       #07091a; --bg-2: #0c1028; --bg-3: #131836;
      --surface:  #171d3e; --surface-2: #1e2552;
      --border:   rgba(255,255,255,0.07); --border-strong: rgba(255,255,255,0.14);
      --text:     #eef0f6; --text-mid: #9aa4c2; --text-dim: #7a84a8;
      --shadow-card: 0 24px 60px -20px rgba(0,0,0,0.7);
      --shadow-pop:  0 10px 30px -10px rgba(0,0,0,0.5);
      --aurora-opacity: 0.18;
    }
    [data-theme="light"] {
      --bg:       #fafaf5; --bg-2: #f3f3ec; --bg-3: #ebeae0;
      --surface:  #ffffff; --surface-2: #f8f7f1;
      --border:   rgba(10,20,40,0.08); --border-strong: rgba(10,20,40,0.16);
      --text:     #0a1226; --text-mid: #4d567a; --text-dim: #8893b3;
      --shadow-card: 0 20px 50px -20px rgba(20,30,60,0.18);
      --shadow-pop:  0 8px 24px -6px rgba(20,30,60,0.12);
      --aurora-opacity: 0.42;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-body); font-size: 16px; line-height: 1.6;
      overflow-x: hidden; transition: background 0.4s ease, color 0.3s ease;
    }
    ::selection { background: color-mix(in oklab, var(--blue) 30%, transparent); color: var(--text); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-2); }
    ::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--text-dim) 60%, transparent); border-radius: 8px; }
    @keyframes blink { 0%,49%{opacity:1}50%,100%{opacity:0} }
    @keyframes slide { from{transform:translateX(0)}to{transform:translateX(-50%)} }
    @keyframes float { 0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,20px)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)}50%{transform:translate(20px,40px)} }
    @keyframes shimmer { 0%{background-position:0% 50%}100%{background-position:200% 50%} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none} }
    .gradient-text {
      background: linear-gradient(135deg, var(--blue) 0%, var(--red) 55%, var(--gold) 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; background-size: 200% 200%;
      animation: shimmer 8s ease infinite;
    }
    .section-eyebrow {
      font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--text-dim);
      display: inline-flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem;
    }
    .section-title {
      font-family: var(--font-head); font-weight: 700;
      font-size: clamp(2rem, 3.6vw, 3rem);
      line-height: 1.05; letter-spacing: -0.025em; margin-bottom: 1rem;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.55rem;
      font-family: var(--font-head); font-weight: 600; font-size: 0.95rem;
      padding: 0.85rem 1.6rem; border-radius: 100px;
      text-decoration: none; border: none; cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--text); color: var(--bg); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-pop); }
    .btn-ghost { background: transparent; color: var(--text); border: 1px solid var(--border-strong); }
    .btn-ghost:hover { background: color-mix(in oklab, var(--text) 6%, transparent); border-color: var(--text-mid); }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { transform: translateY(-2px); box-shadow: var(--shadow-pop); filter: brightness(1.1); }
    .aurora-blob {
      position: absolute; border-radius: 50%; filter: blur(80px);
      pointer-events: none; opacity: var(--aurora-opacity);
      mix-blend-mode: screen; will-change: transform;
    }
    [data-theme="light"] .aurora-blob { mix-blend-mode: multiply; filter: blur(70px); }
    section { position: relative; padding: 7rem 2rem; }
    .container { max-width: 1200px; margin: 0 auto; position: relative; }
    @media (max-width: 860px) {
      section { padding: 5rem 1.25rem; }
      .desktop-only { display: none !important; }
    }
    @media (min-width: 861px) { .mobile-only { display: none !important; } }
    .skip-link {
      position: absolute; top: -100px; left: 1rem; z-index: 9999;
      background: var(--red); color: #fff; padding: 0.5rem 1rem;
      border-radius: 0 0 8px 8px; font-family: var(--font-body);
      font-weight: 600; text-decoration: none; transition: top 0.2s;
    }
    .skip-link:focus { top: 0; }
    .footer-link:hover { color: var(--text) !important; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
